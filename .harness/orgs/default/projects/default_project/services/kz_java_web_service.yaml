service:
  name: kz_java_web_service
  identifier: kz_java_web_service
  serviceDefinition:
    type: Kubernetes
    spec:
      artifacts:
        primary:
          primaryArtifactRef: webapp
          sources:
            - identifier: webapp
              type: DockerRegistry
              spec:
                connectorRef: likzdevdockerhub
                imagePath: likzdev/harness-java-web-app
                tag: <+input>
      manifests:
        - manifest:
            identifier: java_web_manifests
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: likzdevgithub
                  repoName: harness-java-app
                  gitFetchType: Branch
                  branch: main
                  paths:
                    - app/k8s/templates
              valuesPaths:
                - app/k8s/values.yaml
              skipResourceVersioning: false
  gitOpsEnabled: false
  orgIdentifier: default
  projectIdentifier: default_project
