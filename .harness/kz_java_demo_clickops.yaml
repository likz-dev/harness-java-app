pipeline:
  name: kz_java_demo
  identifier: kz_java_demo_clickops
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: likzdevgithub
        repoName: harness-java-app
        build: <+input>
  variables:
    - name: appColor
      type: String
      description: UI accent color (blue, green, amber, red, teal)
      value: <+input>.default(blue)
  stages:
    - stage:
        name: harness-java-build
        identifier: harnessjavabuild
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: likzlocalminikubedelegate
              namespace: harness-ci
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Test
                  identifier: run_test
                  spec:
                    connectorRef: likzdevdockerhub
                    image: maven:3.8-jdk-11
                    shell: Sh
                    command: |-
                      cd app
                      mvn -B clean test
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - app/target/surefire-reports/*.xml
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and push to Docker
                  identifier: build_and_push_to_docker
                  spec:
                    connectorRef: likzdevdockerhub
                    repo: likzdev/harness-java-web-app
                    tags:
                      - <+pipeline.sequenceId>
                    context: app
                    dockerfile: app/Dockerfile
    - stage:
        name: harness-java-deploy
        identifier: harnessjavadeploy
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: false
          execution:
            steps:
              - stepGroup:
                  name: Canary Deployment
                  identifier: canaryDeployment
                  steps:
                    - step:
                        name: Canary Deployment
                        identifier: canaryDeploy
                        type: K8sCanaryDeploy
                        timeout: 10m
                        spec:
                          instanceSelection:
                            type: Count
                            spec:
                              count: 1
                          skipDryRun: false
                    - step:
                        name: Approve Canary
                        identifier: approveCanary
                        type: HarnessApproval
                        timeout: 1d
                        spec:
                          approvalMessage: Verify the canary pod, then approve to promote.
                          includePipelineExecutionHistory: true
                          approvers:
                            userGroups:
                              - account._all_users
                            minimumCount: 1
                            disallowPipelineExecutor: false
                    - step:
                        name: Canary Delete
                        identifier: canaryDelete
                        type: K8sCanaryDelete
                        timeout: 10m
                        spec: {}
              - stepGroup:
                  name: Primary Deployment
                  identifier: primaryDeployment
                  steps:
                    - step:
                        name: Rolling Deployment
                        identifier: rollingDeploy
                        type: K8sRollingDeploy
                        timeout: 10m
                        spec:
                          skipDryRun: false
                          pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Canary Delete
                  identifier: rollbackCanaryDelete
                  type: K8sCanaryDelete
                  timeout: 10m
                  spec: {}
              - step:
                  name: Rolling Rollback
                  identifier: rollingRollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
          service:
            serviceRef: kz_java_web_service
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      sources:
                        - identifier: webapp
                          type: DockerRegistry
                          spec:
                            tag: <+pipeline.sequenceId>
          environment:
            environmentRef: development
            deployToAll: false
            infrastructureDefinitions:
              - identifier: minikube_java
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        gitOpsEnabled: false
