name: harness-java-web-app
replicas: 3

# Resolved by Harness from the service artifact (Docker Hub image + tag)
image: <+artifacts.primary.image>

# Pipeline runtime input (default blue). Allowed: blue, green, amber, red, teal
APP_COLOR: <+pipeline.variables.appColor>

# Same as the Docker image tag deployed by this run
APP_VERSION: <+artifacts.primary.tag>

# Service / container ports
servicePort: 80
containerPort: 8080
